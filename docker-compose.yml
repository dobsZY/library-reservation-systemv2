services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-kutuphane}
      DB_PASSWORD: ${DB_PASSWORD:-kutuphane123}
      DB_DATABASE: ${DB_DATABASE:-kütüphane}
      DATABASE_URL: ${DATABASE_URL:-postgresql://kutuphane:kutuphane123@postgres:5432/kütüphane}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "3000:3000"
    # Yerel stack için postgres/redis bloklarını açın ve depends_on ekleyin:
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy
    command: ["node", "dist/main.js"]

